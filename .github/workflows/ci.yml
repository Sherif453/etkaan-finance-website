name: CI

on:
    push:
    pull_request:
        branches:
            -main

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        name: quality
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out repository
              uses: actions/checkout@v6


            - name: Set up Node.js 20.20.0
              uses: actions/setup-node@v6
              with:
                node-version: '20.20.0'

            - name: Enable Corepack 
              run: corepack enable

            - name: Install dependencies
              run: pnpm install --frozen-lockfile 

            - name: Run typecheck
              run: pnpm typecheck

            - name: Run lint
              run: pnpm lint

            - name: Run build
              run: pnpm build
